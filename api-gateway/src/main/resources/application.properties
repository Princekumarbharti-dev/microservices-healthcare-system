spring.application.name=api-gateway
server.port=8087

spring.main.web-application-type=reactive

management.endpoints.web.exposure.include=health,info

eureka.client.service-url.defaultZone=http://service-registry:8081/eureka

# AUTH SERVICE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# USERPROFILE SERVICE
spring.cloud.gateway.routes[1].id=userprofile-service
spring.cloud.gateway.routes[1].uri=lb://userprofile-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/userprofile/**


# DIAGNOSIS SERVICE
spring.cloud.gateway.routes[2].id=diagnosis-service
spring.cloud.gateway.routes[2].uri=lb://diagnosis-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/diagnosis/**

# BOOKMARK SERVICE
spring.cloud.gateway.routes[3].id=bookmark-service
spring.cloud.gateway.routes[3].uri=lb://bookmark-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/bookmark/**



logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=INFO


